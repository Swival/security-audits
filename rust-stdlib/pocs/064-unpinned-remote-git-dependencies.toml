# Bug: dev-dependencies sourced from a remote git URL with no rev/tag/branch pin.
# Expected: each remote git dep specifies an immutable rev.
# Observed: pre-patch manifest in builtins-test-intrinsics/Cargo.toml resolves to the
#           upstream repository's currently selected commit during `cargo generate-lockfile`.
# Build/run: cargo generate-lockfile --manifest-path 064-unpinned-remote-git-dependencies.toml
# Verify: grep "git+https://github.com/japaric/utest" Cargo.lock to see a non-pinned source.
# (Network access required; the issue is structural and grep'able from the manifest itself.)

[package]
name = "poc064"
version = "0.0.0"
edition = "2021"

[target.'cfg(all(target_arch = "arm", not(any(target_env = "gnu", target_env = "musl")), target_os = "linux"))'.dev-dependencies]
test = { git = "https://github.com/japaric/utest" }
utest-cortex-m-qemu = { default-features = false, git = "https://github.com/japaric/utest" }
utest-macros = { git = "https://github.com/japaric/utest" }
